<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil Premium | ECOSIS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet">

    <style>
        :root {
            --deep-blue: #000c18;
            --accent-cyan: #00e5ff;
            --dark-card: rgba(255, 255, 255, 0.07);
            --border-glass: rgba(255, 255, 255, 0.15);
            --gold-gradient: linear-gradient(135deg, #ffecb3 0%, #ffcc00 50%, #ffa000 100%);
        }

        body {
            background: var(--deep-blue);
            font-family: 'Poppins', sans-serif;
            color: #fff;
            min-height: 100vh;
            background-image: radial-gradient(circle at 50% 50%, #001a33 0%, #000c18 100%);
            display: flex;
            flex-direction: column;
        }

        .navbar-ecos { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border-bottom: 1px solid var(--border-glass); padding: 12px 0; }
        .dashboard-container { flex: 1; display: flex; align-items: center; padding: 40px 0; }
        .premium-card { background: var(--dark-card); backdrop-filter: blur(25px); border: 1px solid var(--border-glass); border-radius: 28px; padding: 35px; box-shadow: 0 25px 60px rgba(0,0,0,0.6); }

        .profile-pic-wrapper { position: relative; width: 150px; height: 150px; margin: 0 auto 25px; }
        .profile-pic { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 4px solid var(--accent-cyan); padding: 4px; }

        .admin-crown-icon {
            position: absolute; top: 2px; right: 2px;
            background: var(--gold-gradient); color: #332b00;
            width: 42px; height: 42px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.2rem; border: 3px solid var(--deep-blue);
            z-index: 10; box-shadow: 0 0 10px rgba(255, 204, 0, 0.5);
            animation: floatCrown 3s ease-in-out infinite, glowCrown 2s infinite alternate;
        }

        @keyframes floatCrown { 0% { transform: translateY(0px); } 50% { transform: translateY(-3px); } 100% { transform: translateY(0px); } }
        @keyframes glowCrown { from { box-shadow: 0 0 8px rgba(255, 204, 0, 0.4); } to { box-shadow: 0 0 18px rgba(255, 204, 0, 0.7), 0 0 5px #fff; } }

        .admin-btn-premium {
            background: var(--gold-gradient); color: #2b2300; font-weight: 800; border: none; border-radius: 15px; padding: 15px;
            display: flex; align-items: center; justify-content: center; gap: 12px; text-transform: uppercase; letter-spacing: 1px;
            box-shadow: 0 5px 15px rgba(255, 204, 0, 0.3); margin-bottom: 20px; text-decoration: none; transition: 0.3s;
        }
        .admin-btn-premium:hover { transform: scale(1.02); color: #000; }

        .btn-nav { width: 100%; padding: 12px; border-radius: 12px; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.3s; text-decoration: none; margin-bottom: 10px; }
        .btn-back { background: rgba(0, 229, 255, 0.08); color: var(--accent-cyan); border: 1px solid rgba(0, 229, 255, 0.3); }
        .btn-exit { background: rgba(255, 82, 82, 0.08); color: #ff5252; border: 1px solid rgba(255, 82, 82, 0.3); }

        .upload-container { position: relative; border: 2px dashed var(--border-glass); border-radius: 15px; padding: 25px; text-align: center; background: rgba(255, 255, 255, 0.02); cursor: pointer; }
        .upload-icon { font-size: 2rem; color: var(--accent-cyan); margin-bottom: 8px; display: block; }
        .input-hidden { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; }

        .input-group-custom { background: rgba(255,255,255,0.05); border: 1px solid var(--border-glass); border-radius: 12px; padding: 12px 20px; color: #fff; width: 100%; transition: 0.3s; }
        .input-group-custom:focus { outline: none; border-color: var(--accent-cyan); background: rgba(255,255,255,0.1); }
        .btn-save-main { background: linear-gradient(90deg, #00b4d8, #00e5ff); color: #000; font-weight: 700; border: none; border-radius: 50px; padding: 15px 60px; display: block; margin: 30px auto 0; transition: 0.3s; cursor: pointer; }
        .btn-save-main:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0, 229, 255, 0.3); }
    </style>
</head>
<body>

<nav class="navbar navbar-ecos sticky-top">
    <div class="container d-flex justify-content-between align-items-center">
        <a class="navbar-brand fw-bold" th:href="@{/}" style="color: var(--accent-cyan); text-decoration:none;">
            <i class="fas fa-leaf me-2"></i>ECOSIS
        </a>

        <div class="d-flex align-items-center">
            <div class="text-end me-3">
                <span class="d-block small opacity-50">Olá, bem-vindo</span>
                <span class="fw-bold text-white" th:text="${session.usuario_nome}">Nome</span>
            </div>
            <img th:src="@{'/img/' + ${session.usuario_foto}}" style="width: 42px; height: 42px; border-radius: 50%; border: 2px solid var(--accent-cyan); object-fit: cover;">
        </div>
    </div>
</nav>

<div class="container dashboard-container">
    <div class="row g-4 justify-content-center align-items-center w-100 mx-auto">

        <div class="col-lg-4 text-center">
            <div class="premium-card">
                <div class="profile-pic-wrapper">
                    <img th:src="@{'/img/' + ${session.usuario_foto}}" class="profile-pic">
                    <div th:if="${session.usuario_nivel == 'admin'}" class="admin-crown-icon shadow">
                        <i class="fas fa-crown"></i>
                    </div>
                </div>
                <h4 class="fw-bold mb-1" th:text="${session.usuario_nome}">Nome</h4>
                <p class="text-info small mb-4" th:text="${#strings.toUpperCase(session.usuario_nivel)}">NÍVEL</p>

                <div class="nav-actions pt-4 border-top border-secondary border-opacity-25">
                    <div th:if="${session.usuario_nivel == 'admin'}">
                        <a th:href="@{/admin/painel}" class="admin-btn-premium">
                            <i class="fas fa-user-shield me-2"></i>Painel Admin
                        </a>
                    </div>
                    <div th:unless="${session.usuario_nivel == 'admin'}">
                        <a th:href="@{/meus_registros}" class="btn-nav btn-back" style="background: rgba(0, 229, 255, 0.15); border-color: var(--accent-cyan); margin-bottom: 20px;">
                            <i class="fas fa-clipboard-list me-2"></i>Ver Registros
                        </a>
                    </div>
                    <a th:href="@{/}" class="btn-nav btn-back"><i class="fas fa-home"></i> Início</a>
                    <a th:href="@{/logout}" class="btn-nav btn-exit"><i class="fas fa-sign-out-alt"></i> Sair</a>
                </div>
            </div>
        </div>

        <div class="col-lg-7">
            <div class="premium-card">
                <h4 class="fw-bold mb-4 text-info"><i class="fas fa-user-edit me-2"></i>Editar Perfil</h4>

                <form id="perfilForm" th:action="@{/perfil/atualizar}" method="POST" enctype="multipart/form-data">
                    <div class="row g-4">
                        <div class="col-12">
                            <label class="small opacity-50 mb-2">Identidade Visual (Foto)</label>
                            <div class="upload-container" onclick="document.getElementById('fotoInput').click();">
                                <i class="fas fa-camera upload-icon"></i>
                                <input type="file" name="foto" id="fotoInput" class="input-hidden" accept="image/*">
                                <span id="fileName" class="text-info">Escolher nova imagem</span>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <label class="small opacity-50 mb-2">Nome Completo</label>
                            <input type="text" name="nome" id="nomeInput" class="input-group-custom" th:value="${session.usuario_nome}" required>
                        </div>
                        <div class="col-md-6">
                            <label class="small opacity-50 mb-2">E-mail Institucional</label>
                            <input type="email" name="email" id="emailInput" class="input-group-custom" th:value="${session.usuario_email}" required>
                        </div>
                        <div class="col-12 text-center">
                            <button type="submit" class="btn btn-save-main shadow">SINCRONIZAR MUDANÇAS</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script th:inline="javascript">
    /*<![CDATA[*/

    // 1. POP-UP DE SUCESSO (Vindo do servidor)
    const statusServidor = [[${mensagem_status}]];
    if (statusServidor === 'sucesso') {
        Swal.fire({
            title: 'Perfil Atualizado!',
            text: 'Suas informações foram sincronizadas com sucesso.',
            icon: 'success',
            background: '#001a33',
            color: '#fff',
            confirmButtonColor: '#00e5ff',
            timer: 2500,
            timerProgressBar: true
        });
    }

    // 2. VALIDAÇÃO ANTES DE ENVIAR (Evita envio sem mudanças)
    const form = document.getElementById('perfilForm');
    const nomeOriginal = [[${session.usuario_nome}]];
    const emailOriginal = [[${session.usuario_email}]];

    form.addEventListener('submit', function(e) {
        const novoNome = document.getElementById('nomeInput').value;
        const novoEmail = document.getElementById('emailInput').value;
        const fotoSelecionada = document.getElementById('fotoInput').files.length > 0;

        // Se nada mudou e nenhuma foto foi escolhida
        if (novoNome === nomeOriginal && novoEmail === emailOriginal && !fotoSelecionada) {
            e.preventDefault(); // Trava o envio do formulário

            Swal.fire({
                title: 'Nenhuma alteração detectada!',
                text: 'Modifique algum campo ou a foto antes de sincronizar.',
                icon: 'info',
                background: '#001a33',
                color: '#fff',
                confirmButtonColor: '#ffa000'
            });
        }
    });

    // 3. ATUALIZA NOME DO ARQUIVO NA TELA
    const fileInput = document.getElementById('fotoInput');
    fileInput.addEventListener('change', function() {
        if (this.files && this.files.length > 0) {
            document.getElementById('fileName').innerText = this.files[0].name;
            document.getElementById('fileName').style.color = "#fff";
        }
    });
    /*]]>*/
</script>
</body>
</html>
