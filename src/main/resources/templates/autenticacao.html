<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>ECOSIS | Acesso</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        :root { --navy: #001e3c; }

        body.auth-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f0f4f8;
            padding: 20px;
        }

        .auth-card {
            width: 100%;
            max-width: 450px;
            background: white;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            border: 1px solid #e1e8ed;
        }

        /* --- CORREÇÃO DE VISIBILIDADE DOS TEXTOS --- */
        .form-floating > label {
            color: #4b5563 !important; /* Cinza escuro para ser visível */
            opacity: 1 !important;
        }

        .form-control {
            color: #1e293b !important; /* Cor do texto que o usuário digita */
            border-radius: 12px !important;
        }

        /* Garante que o label continue escuro quando o campo for focado */
        .form-control:focus ~ label {
            color: var(--navy) !important;
        }
        /* ------------------------------------------- */

        .btn-auth {
            background-color: var(--navy) !important;
            color: white !important;
            border: none !important;
            transition: 0.3s;
        }

        .btn-auth:hover {
            background-color: #003366 !important;
            transform: translateY(-2px);
        }

        .nav-pills .nav-link.active {
            background-color: var(--navy) !important;
        }

        .nav-pills .nav-link {
            color: var(--navy);
            font-weight: 600;
        }
    </style>
</head>
<body class="auth-page">

<div class="auth-card p-4 p-md-5">
    <div class="text-center mb-4">
        <h3 class="fw-bold text-navy">ECOSIS</h3>
    </div>

    <div th:if="${erro}" class="alert alert-danger small" th:text="${erro}"></div>
    <div th:if="${sucesso}" class="alert alert-success small" th:text="${sucesso}"></div>

    <ul class="nav nav-pills nav-fill mb-4" id="pills-tab">
        <li class="nav-item">
            <button class="nav-link active" data-bs-toggle="pill" data-bs-target="#login" type="button">Login</button>
        </li>
        <li class="nav-item">
            <button class="nav-link" data-bs-toggle="pill" data-bs-target="#cadastro" type="button">Cadastro</button>
        </li>
    </ul>

    <div class="tab-content">
        <div class="tab-pane fade show active" id="login">
            <form th:action="@{/login}" method="POST">
                <div class="form-floating mb-3">
                    <input type="email" name="email" class="form-control" id="loginEmail" placeholder="name@example.com" required>
                    <label for="loginEmail">E-mail</label>
                </div>
                <div class="form-floating mb-4">
                    <input type="password" name="senha" class="form-control" id="loginSenha" placeholder="Senha" required>
                    <label for="loginSenha">Senha</label>
                </div>
                <button type="submit" class="btn btn-auth w-100 py-3 rounded-pill fw-bold">Entrar</button>
            </form>
        </div>

        <div class="tab-pane fade" id="cadastro">
            <form th:action="@{/cadastro}" method="POST" enctype="multipart/form-data">
                <div class="form-floating mb-3">
                    <input type="text" name="nome" class="form-control" id="cadNome" placeholder="Nome Completo" required>
                    <label for="cadNome">Nome Completo</label>
                </div>
                <div class="form-floating mb-3">
                    <input type="email" name="email" class="form-control" id="cadEmail" placeholder="Email" required>
                    <label for="cadEmail">E-mail</label>
                </div>
                <div class="form-floating mb-3">
                    <input type="password" name="senha" class="form-control" id="cadSenha" placeholder="Senha" required>
                    <label for="cadSenha">Senha</label>
                </div>
                <div class="mb-4 text-start">
                    <label class="small text-muted ps-2 fw-bold">Foto de Perfil (Opcional)</label>
                    <input type="file" name="foto" class="form-control form-control-sm" accept="image/*">
                </div>
                <button type="submit" class="btn btn-auth w-100 py-3 rounded-pill fw-bold">Criar Conta</button>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
